<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard do Aluno — NSNexus</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .profile-card {
      background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      align-items: center;
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    @media (min-width: 768px) {
      .profile-card {
        flex-direction: row;
        text-align: left;
        padding: var(--space-8);
      }
    }
    
    .profile-card__avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      border: 2px solid var(--accent-cyan);
      overflow: hidden;
      box-shadow: var(--shadow-cyan-glow);
    }
    
    .profile-card__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    <!-- Sidebar navigation -->
    <aside class="sidebar">
      <div class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link sidebar__link--active">
          <span class="material-symbols-outlined">school</span>
          <span>Meus Cursos</span>
        </a>
        <a href="servicos.html" class="sidebar__link">
          <span class="material-symbols-outlined">support_agent</span>
          <span>Agendar Consultoria</span>
        </a>
        <a href="cursos.html" class="sidebar__link">
          <span class="material-symbols-outlined">local_mall</span>
          <span>Comprar Cursos</span>
        </a>
      </div>
      
      <div style="margin-top: auto; padding-top: var(--space-4); border-top: 1px solid var(--border-color)">
        <button onclick="logoutUser()" class="sidebar__link" style="width: 100%; text-align: left;">
          <span class="material-symbols-outlined">logout</span>
          <span>Sair</span>
        </button>
      </div>
    </aside>
    
    <!-- Main content dashboard area -->
    <main class="dashboard-content">
      <!-- Profile Welcome Header -->
      <div class="profile-card">
        <div class="profile-card__avatar">
          <img id="user-avatar" src="" alt="Student Avatar">
        </div>
        <div style="flex-grow: 1;">
          <span class="accent-gradient" style="font-weight: 700; text-transform: uppercase; font-size: var(--font-xs); letter-spacing: 0.05em;">Portal do Aluno NSNexus</span>
          <h1 id="user-name" style="font-size: var(--font-3xl); margin-top: 4px; font-family: var(--font-heading); font-weight: 800;">
            Carregando...
          </h1>
          <p id="user-email" style="font-size: var(--font-sm); color: var(--text-secondary);"></p>
        </div>
        <div>
          <a href="cursos.html" class="btn btn-primary">Adquirir mais Cursos</a>
        </div>
      </div>
      
      <!-- Student enrolled courses catalog grid -->
      <h2 style="font-size: var(--font-2xl); margin-bottom: var(--space-6); font-family: var(--font-heading);">Cursos em Andamento</h2>
      <div class="card-grid" id="dashboard-courses-grid">
        <!-- Injected dynamically by app.js -->
      </div>
    </main>
  </div>

  <!-- JS Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
