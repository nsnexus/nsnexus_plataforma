<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player de Curso — NSNexus</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    /* Specific styles for player.html */
    .player-layout {
      display: grid;
      grid-template-columns: 1fr;
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
    }
    
    @media (min-width: 992px) {
      .player-layout {
        grid-template-columns: 1fr 340px;
      }
    }
    
    .player-main {
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      background-color: var(--bg-primary);
    }
    
    @media (min-width: 768px) {
      .player-main {
        padding: var(--space-8);
      }
    }
    
    .player-sidebar {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: calc(100vh - var(--header-height));
      overflow-y: auto;
    }
    
    .player-sidebar__header {
      padding: var(--space-6) var(--space-4);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 10;
    }
    
    /* Video custom styling */
    .video-player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-color);
      position: relative;
    }
    
    .video-player__controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      padding: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      z-index: 10;
    }
    
    /* PDF custom styling */
    .pdf-viewer {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    
    .pdf-viewer__header {
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border-color);
      padding: var(--space-4);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .pdf-viewer__page {
      padding: var(--space-8);
      display: flex;
      justify-content: center;
    }
    
    .pdf-viewer__dummy-page {
      background: #fff;
      color: #333;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1/1.4;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
    }
    
    .pdf-viewer__dummy-page p {
      color: #555;
    }
    
    /* Modules/lessons list inside player sidebar */
    .player-mod {
      border-bottom: 1px solid var(--border-color);
    }
    
    .player-mod__header {
      padding: var(--space-4);
      background: rgba(255,255,255,0.01);
      font-weight: 600;
      font-size: var(--font-sm);
      color: var(--text-primary);
    }
    
    .player-les {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-4);
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: all var(--transition-fast);
      cursor: pointer;
    }
    
    .player-les:hover {
      background: rgba(255,255,255,0.03);
    }
    
    .player-les--active {
      background: rgba(0, 102, 255, 0.08);
      border-left: 3px solid var(--accent-cyan);
    }
    
    .player-les__check {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: transparent;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    
    .player-les__check--done {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      color: #000;
    }
    
    .player-les__info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .player-les__title {
      font-size: var(--font-sm);
      font-weight: 500;
      color: var(--text-secondary);
      line-height: 1.3;
    }
    
    .player-les--active .player-les__title {
      color: var(--text-primary);
    }
    
    .player-les__meta {
      font-size: var(--font-xs);
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="player-layout">
    <!-- Main screen (Video/PDF viewer + info) -->
    <main class="player-main">
      <div id="player-media">
        <!-- Loaded dynamically by player.js -->
      </div>
      
      <div id="player-meta">
        <!-- Loaded dynamically by player.js -->
      </div>
    </main>
    
    <!-- Sidebar (Chapters & lessons list) -->
    <aside class="player-sidebar">
      <div class="player-sidebar__header">
        <h3 id="course-title" style="font-size: var(--font-base); font-family: var(--font-heading); margin-bottom: 4px;">Carregando curso...</h3>
        <a href="dashboard.html" style="font-size: var(--font-xs); color: var(--accent-cyan); display: flex; align-items: center; gap: 4px;">
          <span class="material-symbols-outlined" style="font-size: 14px;">arrow_back</span> Voltar ao Dashboard
        </a>
      </div>
      
      <div id="player-syllabus" style="flex-grow: 1;">
        <!-- Loaded dynamically by player.js -->
      </div>
    </aside>
  </div>

  <!-- JS Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
