<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta Estudantil — NSNexus</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .auth-container {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
      background-color: var(--bg-primary);
    }
    
    @media (min-width: 992px) {
      .auth-container {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    .auth-banner {
      display: none;
      background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-primary) 100%);
      border-right: 1px solid var(--border-color);
      flex-direction: column;
      justify-content: center;
      padding: var(--space-16);
      position: relative;
      overflow: hidden;
    }
    
    @media (min-width: 992px) {
      .auth-banner {
        display: flex;
      }
    }
    
    .auth-form-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--space-8);
    }
    
    .auth-box {
      width: 100%;
      max-width: 420px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <!-- Left branding banner (desktops only) -->
    <div class="auth-banner">
      <div style="position: absolute; top: -50px; left: -50px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(0, 102, 255, 0.08) 0%, rgba(6, 7, 13, 0) 70%); pointer-events: none;"></div>
      <div style="position: absolute; bottom: -50px; right: -50px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(0, 245, 212, 0.08) 0%, rgba(6, 7, 13, 0) 70%); pointer-events: none;"></div>
      
      <div style="position: relative; z-index: 10;">
        <a href="index.html" class="logo" style="margin-bottom: var(--space-8);">
          NSNexus<span class="logo__dot"></span>
        </a>
        <h2 style="font-size: var(--font-4xl); margin-bottom: var(--space-4); font-family: var(--font-heading); font-weight: 800; line-height: 1.15;">
          Capacite seu time com <br><span class="text-gradient">conhecimento prático.</span>
        </h2>
        <p style="color: var(--text-secondary); max-width: 440px;">Crie sua conta em poucos cliques e tenha acesso às aulas com foco de negócios desenhadas para resolver problemas reais.</p>
      </div>
    </div>
    
    <!-- Right form card panel -->
    <div class="auth-form-side">
      <div class="auth-box">
        <a href="index.html" class="logo" style="margin-bottom: var(--space-6); display: inline-flex;">
          NSNexus<span class="logo__dot"></span>
        </a>
        
        <h1 style="font-size: var(--font-2xl); margin-bottom: var(--space-1); font-family: var(--font-heading);">Crie sua conta</h1>
        <p style="color: var(--text-muted); font-size: var(--font-sm); margin-bottom: var(--space-6);">Insira seus dados para obter seu acesso estudantil.</p>
        
        <form onsubmit="handleSignupSubmit(event)">
          <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" id="reg-name" class="form-control" placeholder="Ex: Lucas Souza" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">E-mail Estudantil</label>
            <input type="email" id="reg-email" class="form-control" placeholder="lucas@email.com" required>
          </div>
          
          <div class="form-group" style="margin-bottom: var(--space-6);">
            <label class="form-label">Senha de Acesso</label>
            <input type="password" id="reg-pass" class="form-control" placeholder="Mínimo 6 caracteres" required>
          </div>
          
          <div class="form-group" style="margin-bottom: var(--space-6); display: flex; align-items: flex-start; gap: 8px;">
            <input type="checkbox" id="terms-agree" style="margin-top: 4px; cursor: pointer;" required>
            <label for="terms-agree" style="font-size: var(--font-xs); color: var(--text-secondary); cursor: pointer; line-height: 1.4;">
              Concordo com os <a href="termos.html" target="_blank" style="color: var(--accent-cyan); text-decoration: underline;">Termos de Uso</a> e <a href="termos.html" target="_blank" style="color: var(--accent-cyan); text-decoration: underline;">Políticas de Privacidade</a> da NSNexus.
            </label>
          </div>
          
          <button type="submit" class="btn btn-primary btn-full">Criar Conta Estudantil</button>
        </form>
        
        <!-- Social Auth Divider -->
        <div style="display: flex; align-items: center; text-align: center; margin: var(--space-6) 0; color: var(--text-muted); font-size: var(--font-xs);">
          <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--border-color); margin-right: 10px;">
          <span>OU CRIAR CONTA COM</span>
          <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--border-color); margin-left: 10px;">
        </div>

        <!-- Simulated Google Login (Works everywhere) -->
        <button type="button" onclick="triggerMockGoogleLogin()" class="btn btn-secondary btn-full" style="display: flex; align-items: center; justify-content: center; gap: var(--space-2); margin-bottom: var(--space-4);">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.24h2.9c1.69-1.55 2.69-3.84 2.69-6.57z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.9-2.24c-.8.54-1.84.87-3.06.87-2.35 0-4.34-1.58-5.05-3.7H.9v2.32C2.38 15.98 5.43 18 9 18z"/>
            <path fill="#FBBC05" d="M3.95 10.73A5.4 5.4 0 0 1 3.6 9c0-.6.1-1.18.35-1.73V4.95H.9A8.94 8.94 0 0 0 0 9c0 1.5.37 2.92 1.02 4.18l2.93-2.45z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.1C13.46.66 11.42 0 9 0 5.43 0 2.38 2.02.9 4.95l3.05 2.37C4.66 5.17 6.65 3.58 9 3.58z"/>
          </svg>
          <span>Criar conta com o Google</span>
        </button>

        <!-- Real Google SDK (Hidden by default, can be initialized with Client ID) -->
        <div style="display: none; justify-content: center; width: 100%;" id="google-sdk-container">
          <div id="g_id_onload"
               data-client_id="47323297494-4tecc8qab383uijor8c3us7fq5llrovq.apps.googleusercontent.com"
               data-callback="handleGoogleCredentialResponse"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-size="large"
               data-theme="dark"
               data-text="signup_with"
               data-shape="rectangular"
               data-logo_alignment="left"
               data-width="100%">
          </div>
        </div>
        
        <p style="font-size: var(--font-sm); color: var(--text-secondary); text-align: center; margin-top: var(--space-6);">
          Já possui conta? <a href="login.html" style="color: var(--accent-cyan); font-weight: 600;">Entrar</a>
        </p>
      </div>
    </div>
  </div>

  <!-- JS Scripts -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    async function handleSignupSubmit(event) {
      event.preventDefault();
      const submitBtn = event.target.querySelector("button[type='submit']");
      const originalText = submitBtn.textContent;
      
      submitBtn.disabled = true;
      submitBtn.textContent = "Criando Conta...";

      const name = document.getElementById("reg-name").value;
      const email = document.getElementById("reg-email").value;
      const pass = document.getElementById("reg-pass").value;
      
      const success = await signup(name, email, pass);
      
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;

      if (success) {
        if (typeof supabaseClient !== "undefined" && supabaseClient) {
          window.location.href = "login.html";
        } else {
          window.location.href = "dashboard.html";
        }
      }
    }

  </script>
</body>
</html>
